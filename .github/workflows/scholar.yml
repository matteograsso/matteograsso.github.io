name: Update Google Scholar stats

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC (weekly)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scholar-stats
  cancel-in-progress: false

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4
      - id: scrape
        env:
          PROFILE_URL: "https://scholar.google.com/citations?user=msjTpJQAAAAJ&hl=en"
        run: python tools/scholar_scrape.py
      - name: Commit if updated
        if: steps.scrape.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/scholar.yml
          if git diff --cached --quiet; then
            echo "No change in _data/scholar.yml"
          else
            git commit -m "chore: update Google Scholar stats"
            git push
          fi
